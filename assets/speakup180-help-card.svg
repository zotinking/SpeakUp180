<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#f4f6f8"/>
  <circle cx="540" cy="0" r="360" fill="#0d6b64" opacity="0.08"/>
  <style>
    .ink{fill:#101318}.muted{fill:#66707c}.accent{fill:#0d6b64}.card{fill:#fff;stroke:#dfe5eb;stroke-width:1}.soft{fill:#e7f2f0}.title{font:800 76px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.h1{font:800 42px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.sub{font:600 24px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.body{font:500 30px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.stepTitle{font:800 34px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.stepText{font:500 24px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.badge{font:900 28px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}.small{font:500 22px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  </style>
  <rect x="72" y="92" width="72" height="72" rx="18" fill="#101318"/><text x="108" y="138" fill="#fff" text-anchor="middle" class="badge">180</text>
  <text x="166" y="126" class="ink h1">SpeakUp 180</text><text x="166" y="170" class="muted sub">입으로 깨우는 영어</text>
  <text x="72" y="320" class="ink title">하루 3번,</text><text x="72" y="408" class="ink title">입으로 깨우는 영어 루틴</text>
  <text x="72" y="466" class="muted body">아침에 문장을 입에 넣고, 자투리 시간에 꺼내고,</text><text x="72" y="514" class="muted body">자기 전에 누적 복습으로 기억을 고정하세요.</text>
  <g transform="translate(72 594)"><rect class="card" width="936" height="186" rx="18"/><rect x="30" y="31" width="72" height="72" rx="18" class="soft"/><text x="66" y="77" text-anchor="middle" class="accent badge">아침</text><text x="142" y="66" class="ink stepTitle">오늘 10문장을 5분 동안 읽기</text><text x="142" y="112" class="muted stepText">영어 문장을 보며 계속 소리 내어 읽습니다.</text><text x="142" y="148" class="muted stepText">단어보다 문장의 틀을 입과 머리에 먼저 넣습니다.</text></g>
  <g transform="translate(72 800)"><rect class="card" width="936" height="300" rx="18"/><rect x="30" y="31" width="72" height="72" rx="18" class="soft"/><text x="66" y="77" text-anchor="middle" class="accent badge">인출</text><text x="142" y="66" class="ink stepTitle">한글 힌트로 1차 Recall</text><text x="142" y="112" class="muted stepText">영어 어순 한글 힌트만 보고 영어 문장을 직접 말합니다.</text><rect x="142" y="170" width="760" height="100" rx="12" fill="#f8fbfa"/><rect x="142" y="170" width="6" height="100" rx="3" fill="#0d6b64"/><text x="168" y="214" class="ink small">What do you do in your free time?</text><text x="168" y="250" class="ink small">→ 무엇을 하나요 / 당신의 자유 시간에</text></g>
  <g transform="translate(72 1120)"><rect class="card" width="936" height="186" rx="18"/><rect x="30" y="31" width="72" height="72" rx="18" class="soft"/><text x="66" y="77" text-anchor="middle" class="accent badge">틈</text><text x="142" y="66" class="ink stepTitle">자투리 시간에는 힌트 카드만 보기</text><text x="142" y="112" class="muted stepText">출퇴근길, 설거지, 산책처럼 짧은 시간에는</text><text x="142" y="148" class="muted stepText">한글 힌트를 보고 웅얼거리며 영어로 꺼냅니다.</text></g>
  <g transform="translate(72 1326)"><rect class="card" width="936" height="186" rx="18"/><rect x="30" y="31" width="72" height="72" rx="18" class="soft"/><text x="66" y="77" text-anchor="middle" class="accent badge">밤</text><text x="142" y="66" class="ink stepTitle">자기 전 누적 암송</text><text x="142" y="112" class="muted stepText">어제와 오늘 문장을 먼저 복습하고,</text><text x="142" y="148" class="muted stepText">지난 5일 문장까지 묶어 장기 기억으로 옮깁니다.</text></g>
  <g transform="translate(72 1556)"><rect class="card" width="302" height="142" rx="18"/><text x="24" y="50" class="ink sub">아침</text><text x="24" y="88" class="muted small">오늘 10문장</text><text x="24" y="122" class="muted small">5분 소리 내어 읽기</text></g>
  <g transform="translate(390 1556)"><rect class="card" width="302" height="142" rx="18"/><text x="24" y="50" class="ink sub">자투리 시간</text><text x="24" y="88" class="muted small">한글 힌트 카드</text><text x="24" y="122" class="muted small">걷거나 움직이며 인출</text></g>
  <g transform="translate(706 1556)"><rect class="card" width="302" height="142" rx="18"/><text x="24" y="50" class="ink sub">자기 전</text><text x="24" y="88" class="muted small">어제 + 오늘</text><text x="24" y="122" class="muted small">지난 5일 누적 암송</text></g>
  <line x1="72" y1="1754" x2="1008" y2="1754" stroke="#dfe5eb"/><text x="72" y="1810" class="accent small" font-weight="800">선택:</text><text x="134" y="1810" class="muted small">시간이 확보된 날은 25분 집중 모드로 한 번 더 반복</text><text x="1008" y="1810" text-anchor="end" class="muted small">SpeakUp 180</text>
</svg>
